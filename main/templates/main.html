<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Client</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- Boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<body>

<div class="container py-5">
    <div class="glass-card text-white shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

            <h1 class="mb-4">User Page</h1>

            <!-- ROOM ID -->
            <div class="mb-3">
                <label for="roomId" class="form-label">Room ID</label>
                <input type="text"
                       id="roomId"
                       class="form-control"
                       placeholder="Room name"
                       oninput="refreshChunkCount()">
            </div>

            <!-- CHUNK NUMBER -->
            <div class="mb-3">
                <label for="chunkNumber" class="form-label">Chunk number</label>
                <input type="text"
                       id="chunkNumber"
                       class="form-control"
                       placeholder="Chunk number">
            </div>

            <!-- LISTS -->
            <div class="mb-4">
                <div class="p-3 rounded bg-black text-white d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">Aviable chunk-s</h6>

                        <small>Aviable chunk-s for this room</small>

                        <div id="chunkList" class="small text-white-50 mt-2">
                            -
                        </div>
                    </div>

                    <div id="chunkCount"
                         class="fs-1 fw-bold">
                        0
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="p-3 rounded bg-black text-white d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-1">Aviable worker-s</h4>
                    </div>

                    <div id="availableWorkerCount"
                         class="fs-1 fw-bold">
                        0
                    </div>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="d-flex flex-wrap gap-2 mb-4">
                <button class="btn btn-success" onclick="startBot()">
                    START
                </button>

                <button class="btn btn-danger" onclick="stopBot()">
                    STOP
                </button>

                <button class="btn btn-primary" onclick="getStatus()">
                    STATUS
                </button>

                <button class="btn btn-primary" onclick="transcribeTest()">
                    TRANSCRIBE TEST
                </button>
            </div>

            <!-- SUBTITLE -->
            <div class="mt-4">
                <h5>Subtitle</h5>
                <div id="subtitleBox"
                     class="text-white p-3 rounded"
                     style="height:250px; overflow:auto;">
                </div>
            </div>

            <!-- STATUS -->
            <div class="mb-4">
                <h5>Status</h5>
                <div id="statusBox"
                     class="bg-black text-white p-3 rounded"
                     style="min-height:80px;">
                    No status yet
                </div>
            </div>

            <!-- LOG -->
            <div class="col-md-6">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="mb-0">Log</h5>

                    <button class="btn btn-sm btn-outline-dark" onclick="clearLog()">
                        Clear log
                    </button>
                </div>

                <div id="log"
                     class="p-3 rounded"
                     style="height:250px; overflow:auto;">
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const socket = io("http://10.1.0.26:3000");

socket.on("connect", () => {
    socket.emit("get_worker_list");
    console.log("Connected to pod.");
    refreshChunkCount();
});

socket.on("log", (data) => {
    log("[SERVER] " + data.message);
});

socket.on("available_worker_list", (data) => {
    const count = data.workers ? data.workers.length : 0;
    document.getElementById("availableWorkerCount").innerText = count;
});

socket.on("subtitle", (data) => {
    const currentRoomId = document.getElementById("roomId").value.trim();

    if (data.roomId !== currentRoomId) return;

    const box = document.getElementById("subtitleBox");

    box.innerHTML += `
        <div class="subtitle-item">
            ${data.roomId} - ${data.chunkNumber}: ${data.text}
        </div>
    `;

    box.scrollTop = box.scrollHeight;

    refreshChunkCount();
});

function transcribeTest() {
    const roomId = document.getElementById("roomId").value.trim();
    const chunkNumber = document.getElementById("chunkNumber").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    if (!chunkNumber) {
        Swal.fire({
            icon: 'error',
            title: 'Missing chunk',
            text: 'Write a chunk number.'
        });
        return;
    }

    socket.emit("command", {
        action: "transcribe_test",
        roomId: roomId,
        chunkNumber: chunkNumber
    });

    Swal.fire({
        icon: 'info',
        title: 'Transcribing',
        text: `Room: ${roomId}, chunk: ${chunkNumber}`,
        timer: 1600,
        showConfirmButton: false
    });

    log(`TRANSCRIBE SENT: room=${roomId}, chunk=${chunkNumber}`);
}

const log = (msg) => {
    const box = document.getElementById("log");

    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
};

const setStatus = (data) => {
    document.getElementById("statusBox").innerHTML = `
        <pre class="mb-0 text-white">${JSON.stringify(data, null, 2)}</pre>
    `;
};

async function startBot() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    try {
        const response = await fetch(`/start/${roomId}`, {
            method: "POST"
        });

        const data = await response.json();

        setStatus(data);
        log("START: " + JSON.stringify(data));

        Swal.fire({
            icon: 'success',
            title: 'Started',
            text: `Room started: ${roomId}`,
            timer: 1500,
            showConfirmButton: false
        });
    } catch (err) {
        Swal.fire({
            icon: 'error',
            title: 'Start failed',
            text: err.message
        });

        log("START hiba: " + err.message);
    }
}

async function stopBot() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    Swal.fire({
        title: 'Stop room?',
        text: roomId,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, stop it',
        cancelButtonText: 'Cancel'
    }).then(async (result) => {
        if (!result.isConfirmed) return;

        try {
            const response = await fetch(`/command/stop/${roomId}`, {
                method: "POST"
            });

            const data = await response.json();

            setStatus(data);
            log("STOP: " + JSON.stringify(data));

            Swal.fire({
                icon: 'success',
                title: 'Stopped',
                text: `Room stopped: ${roomId}`,
                timer: 1500,
                showConfirmButton: false
            });
        } catch (err) {
            Swal.fire({
                icon: 'error',
                title: 'Stop failed',
                text: err.message
            });

            log("STOP hiba: " + err.message);
        }
    });
}

async function getStatus() {
    try {
        const response = await fetch("/status");
        const data = await response.json();

        setStatus(data);
        log("STATUS: " + JSON.stringify(data));
    } catch (err) {
        log("STATUS hiba: " + err.message);
    }
}

function refreshChunkCount() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        document.getElementById("chunkCount").innerText = "0";
        return;
    }

    socket.emit("get_chunk_count", {
        roomId: roomId
    });
}

socket.on("chunk_count", (data) => {
    const roomId = document.getElementById("roomId").value.trim();

    if (data.roomId !== roomId) return;

    document.getElementById("chunkCount").innerText =
        Math.max(0, data.count - 1);

    const chunks = data.chunks || [];

    document.getElementById("chunkList").innerText =
        chunks.length ? "Chunks: " + chunks.join(", ") : "-";
});

function clearLog() {

    Swal.fire({
        title: 'Clear log?',
        text: 'All log messages will be deleted.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes',
        cancelButtonText: 'Cancel'
    }).then((result) => {

        if (result.isConfirmed) {

            document.getElementById("log").innerHTML = "";

            Swal.fire({
                icon: 'success',
                title: 'Cleared',
                text: 'Log cleared successfully.',
                timer: 1200,
                showConfirmButton: false
            });
        }
    });
}
</script>

</body>
</html>
