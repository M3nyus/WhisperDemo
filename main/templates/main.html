<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Client</title>

    <!-- Boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    
</head>

<body>

<div class="app-shell">
    <div class="glass-card p-4 p-lg-5">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="mb-1 fw-bold text-white">Whisper Room Control</h1>
            </div>


        </div>

        <div class="row g-4">

            <div class="col-lg-4">
                <div class="panel h-100">

                    <h5 class="mb-3 text-white">Room Control</h5>

                    <div class="mb-3">
                        <label for="roomId" class="form-label text-white">Room ID</label>
                        <input type="text"
                               id="roomId"
                               class="form-control"
                               placeholder="Enter room name"
                               oninput="refreshChunkCount()">
                    </div>

                    <div class="mb-4">
                        <label for="chunkNumber" class="form-label text-white">Chunk number</label>
                        <input type="text"
                               id="chunkNumber"
                               class="form-control"
                               placeholder="Enter chunk number">
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success" onclick="startBot()">START ROOM</button>
                        <button class="btn btn-danger" onclick="stopBot()">STOP ROOM</button>
                        <button class="btn btn-primary" onclick="getStatus()">STATUS</button>
                        <button class="btn btn-info text-white" onclick="transcribeTest()">TRANSCRIBE TEST</button>
                    </div>

                </div>
            </div>

            <div class="col-lg-8">
                <div class="row g-3 mb-4">

                    <div class="col-md-6">
                        <div class="metric-card h-100">
                            <div class="metric-label text-white">Available chunks</div>
                            <div id="chunkCount" class="metric-value mt-2 text-white">0</div>
                            <div id="chunkList" class="small text-white mt-2">-</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="metric-card h-100">
                            <div class="metric-label text-white">Available workers</div>
                            <div id="availableWorkerCount" class="metric-value mt-2 text-white">0</div>
                        </div>
                    </div>

                </div>

                <div class="panel mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0 text-white">Subtitle</h5>
                    </div>

                    <div id="subtitleBox" class="console-box text-white"></div>
                </div>

                <div class="panel mb-4">
                    <h5 class="mb-2 text-white">Status</h5>

                    <div id="statusBox" class="console-box" style="min-height: 90px; height: auto;">
                        No status yet
                    </div>
                </div>

                <div class="panel">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0 text-white">Log</h5>

                        <button class="btn btn-sm btn-outline-light" onclick="clearLog()">
                            Clear log
                        </button>
                    </div>

                    <div id="log" class="console-box text-white"></div>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
const socket = io("http://zv-project-server:3000");

socket.on("connect", () => {
    socket.emit("get_worker_list");
    console.log("Connected to pod.");
    refreshChunkCount();
});

socket.on("log", (data) => {
    log("[SERVER] " + data.message);
});

socket.on("available_worker_list", (data) => {
    const count = data.workers ? data.workers.length : 0;
    document.getElementById("availableWorkerCount").innerText = count;
});

socket.on("subtitle", (data) => {
    const currentRoomId = document.getElementById("roomId").value.trim();

    if (data.roomId !== currentRoomId) return;

    const box = document.getElementById("subtitleBox");

    box.innerHTML += `
        <div class="subtitle-item">
            ${data.roomId} - ${data.chunkNumber}: ${data.text}
        </div>
    `;

    box.scrollTop = box.scrollHeight;

    refreshChunkCount();
});

function transcribeTest() {
    const roomId = document.getElementById("roomId").value.trim();
    const chunkNumber = document.getElementById("chunkNumber").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    if (!chunkNumber) {
        Swal.fire({
            icon: 'error',
            title: 'Missing chunk',
            text: 'Write a chunk number.'
        });
        return;
    }

    socket.emit("command", {
        action: "transcribe_test",
        roomId: roomId,
        chunkNumber: chunkNumber
    });

    Swal.fire({
        icon: 'info',
        title: 'Transcribing',
        text: `Room: ${roomId}, chunk: ${chunkNumber}`,
        timer: 1600,
        showConfirmButton: false
    });

    log(`TRANSCRIBE SENT: room=${roomId}, chunk=${chunkNumber}`);
}

const log = (msg) => {
    const box = document.getElementById("log");

    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
};

const setStatus = (data) => {
    document.getElementById("statusBox").innerHTML = `
        <pre class="mb-0 text-white">${JSON.stringify(data, null, 2)}</pre>
    `;
};

async function startBot() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    try {
        const response = await fetch(`/start/${roomId}`, {
            method: "POST"
        });

        const data = await response.json();

        setStatus(data);
        log("START: " + JSON.stringify(data));

        Swal.fire({
            icon: 'success',
            title: 'Started',
            text: `Room started: ${roomId}`,
            timer: 1500,
            showConfirmButton: false
        });
    } catch (err) {
        Swal.fire({
            icon: 'error',
            title: 'Start failed',
            text: err.message
        });

        log("START hiba: " + err.message);
    }
}

async function stopBot() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a room name.'
        });
        return;
    }

    Swal.fire({
        title: 'Stop room?',
        text: roomId,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, stop it',
        cancelButtonText: 'Cancel'
    }).then(async (result) => {
        if (!result.isConfirmed) return;

        try {
            const response = await fetch(`/command/stop/${roomId}`, {
                method: "POST"
            });

            const data = await response.json();

            setStatus(data);
            log("STOP: " + JSON.stringify(data));

            Swal.fire({
                icon: 'success',
                title: 'Stopped',
                text: `Room stopped: ${roomId}`,
                timer: 1500,
                showConfirmButton: false
            });
        } catch (err) {
            Swal.fire({
                icon: 'error',
                title: 'Stop failed',
                text: err.message
            });

            log("STOP hiba: " + err.message);
        }
    });
}

async function getStatus() {
    try {
        const response = await fetch("/status");
        const data = await response.json();

        setStatus(data);
        log("STATUS: " + JSON.stringify(data));
    } catch (err) {
        log("STATUS hiba: " + err.message);
    }
}

function refreshChunkCount() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        document.getElementById("chunkCount").innerText = "0";
        return;
    }

    socket.emit("get_chunk_count", {
        roomId: roomId
    });
}

socket.on("chunk_count", (data) => {
    const roomId = document.getElementById("roomId").value.trim();

    if (data.roomId !== roomId) return;

    document.getElementById("chunkCount").innerText =
        Math.max(0, data.count - 1);

    const chunks = data.chunks || [];

    document.getElementById("chunkList").innerText =
        chunks.length ? "Chunks: " + chunks.join(", ") : "-";
});

function clearLog() {

    Swal.fire({
        title: 'Clear log?',
        text: 'All log messages will be deleted.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes',
        cancelButtonText: 'Cancel'
    }).then((result) => {

        if (result.isConfirmed) {

            document.getElementById("log").innerHTML = "";

            Swal.fire({
                icon: 'success',
                title: 'Cleared',
                text: 'Log cleared successfully.',
                timer: 1200,
                showConfirmButton: false
            });
        }
    });
}
</script>

</body>
</html>
