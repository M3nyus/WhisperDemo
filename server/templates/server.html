<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Server page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
    body {
        min-height: 100vh;
        margin: 0;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: url('/static/bg.jpg');
        background-size: cover;
        background-position: center;
        color: white;
    }

    .app-shell {
        width: min(1200px, 94vw);
        margin: 40px auto;
    }

    .glass-card {
        background: rgb(76, 108, 253) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border: 1px solid lightgray;

        border-radius: 24px;

        box-shadow: 0 24px 80px black;
    }

    .panel {
        background: gray;

        border: 1px solid slategray;

        border-radius: 18px;

        padding: 18px;
    }

    .metric-card {
        background: gray;

        border: 1px solid skyblue;

        border-radius: 18px;

        padding: 18px;
    }

    .metric-value {
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
    }

    .metric-label {
        color: lightgray;
        font-size: 14px;
    }

    .form-control {
        background: lightgray;

        border: 1px solid slategray;

        color: white;

        border-radius: 12px;

        padding: 12px 14px;
    }

    .btn {
        border-radius: 12px;
        padding: 10px 16px;
        font-weight: 700;
    }

    .console-box {
        background: black;

        border: 1px solid slategray;

        border-radius: 16px;

        padding: 14px;

        height: 250px;

        overflow: auto;

        font-family: 'Consolas', monospace;

        font-size: 13px;
    }

    .worker-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .worker-item {
        background: black !important;

        border: 1px solid slategray !important;

        border-radius: 12px !important;

        color: whitesmoke !important;
    }

    .worker-name {
        font-weight: 700;
        word-break: break-all;
    }
</style>

</head>

<body>

<div class="app-shell">
    <div class="glass-card p-4 p-lg-5">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="mb-1 fw-bold text-white">Whisper Server Control</h1>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-lg-4">
                <div class="panel h-100">

                    <h5 class="mb-3 text-white">Room Control</h5>

                    <div class="mb-3">
                        <label for="roomId" class="form-label text-white">Room ID</label>
                        <input type="text"
                               id="roomId"
                               class="form-control"
                               placeholder="Enter room ID">
                    </div>

                    <div class="mb-4">
                        <label for="extraInput" class="form-label text-white">Chunk number</label>
                        <input type="text"
                               id="extraInput"
                               class="form-control"
                               placeholder="Enter chunk number">
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success" onclick="startRoom()">START ROOM</button>
                        <button class="btn btn-danger" onclick="stopRoom()">STOP ROOM</button>
                        <button class="btn btn-primary" onclick="testTranscribe()">TRANSCRIBE TEST</button>
                    </div>

                </div>
            </div>

            <div class="col-lg-8">

                <div class="row g-3 mb-4">

                    <div class="col-md-6">
                        <div class="metric-card h-100">
                            <div class="metric-label text-white">Available workers</div>
                            <div id="availableWorkerCount" class="metric-value mt-2 text-white">0</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="metric-card h-100">
                            <div class="metric-label text-white">Running workers</div>
                            <div id="runningWorkerCount" class="metric-value mt-2 text-white">0</div>
                        </div>
                    </div>

                </div>

                <div class="panel mb-4">
                    <h5 class="mb-3 text-white">Available Workers</h5>

                    <ul id="aviableWorkerList" class="worker-list list-unstyled mb-0">
                        <li class="worker-item p-3">
                            No available worker
                        </li>
                    </ul>
                </div>

                <div class="panel mb-4">
                    <h5 class="mb-3 text-white">Running Workers</h5>

                    <ul id="runningWorkerList" class="worker-list list-unstyled mb-0 text-white">
                        <li class="worker-item p-3 text-white">
                            No running worker
                        </li>
                    </ul>
                </div>

                <div class="panel mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0 text-white">Subtitle</h5>
                    </div>

                    <div id="subtitleBox" class="console-box text-white" style="height:300px;"></div>
                </div>

                <div class="panel">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0 text-white">Log</h5>

                        <button class="btn btn-sm btn-outline-light" onclick="clearLog()">
                            Clear log
                        </button>
                    </div>

                    <div id="log" class="console-box text-white"></div>
                </div>

            </div>

        </div>

    </div>
</div>

<script>

const socket = io();

const log = (msg) => {
    document.getElementById("log").innerHTML += `
        <div>${msg}</div>
    `;

    const logBox = document.getElementById("log");
    logBox.scrollTop = logBox.scrollHeight;
};

socket.on("connect", () => {

    log("connected");

    socket.emit("get_worker_list");

    Swal.fire({
        icon: 'success',
        title: 'Connected',
        text: 'Socket connected to server.',
        timer: 1200,
        showConfirmButton: false
    });
});

socket.on("disconnect", () => {

    Swal.fire({
        icon: 'warning',
        title: 'Disconnected',
        text: 'Lost connection to server.'
    });
});

socket.on("log", (data) => {
    log("[SERVER] " + data.message);
});

socket.on("subtitle", (data) => {
    const box = document.getElementById("subtitleBox");

    box.innerHTML += `
        <div class="subtitle-item">
            ${data.roomId} - ${data.chunkNumber}: ${data.text}
        </div>
    `;

    box.scrollTop = box.scrollHeight;
});

socket.on("worker_list", (data) => {
    const list = document.getElementById("runningWorkerList");
    list.innerHTML = "";

    if (!data.workers || data.workers.length === 0) {
        list.innerHTML = `
            <li class="list-group-item bg-black text-white">
                Nincs futó worker
            </li>
        `;
        return;
    }

    data.workers.forEach((worker) => {
        list.innerHTML += `
            <li class="list-group-item bg-black text-success d-flex justify-content-between align-items-center">
                <span>${worker}</span>

                <a class="btn btn-sm btn-primary"
                   href="/client/${worker}"
                   target="_blank">
                    Open client
                </a>
            </li>
        `;
    });
});

socket.on("available_worker_list", (data) => {
    const list = document.getElementById("aviableWorkerList");
    list.innerHTML = "";

    if (!data.workers || data.workers.length === 0) {
        list.innerHTML = `
            <li class="list-group-item bg-black text-white">
                No aviable worker
            </li>
        `;
        return;
    }

    data.workers.forEach((worker) => {
        list.innerHTML += `
            <li class="list-group-item bg-black text-info d-flex justify-content-between align-items-center">
                <span>${worker.workerId}</span>

                <button class="btn btn-sm btn-danger"
                        onclick="shutdownWorker('${worker.sid}')">
                    Stop worker
                </button>
            </li>
        `;
    });
});

function startRoom() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a Room ID.'
        });

        return;
    }

    socket.emit("command", {
        action: "start_room",
        roomId: roomId
    });

    Swal.fire({
        icon: 'success',
        title: 'Room started',
        text: `Room: ${roomId}`,
        timer: 1500,
        showConfirmButton: false
    });
}

function stopRoom() {
    const roomId = document.getElementById("roomId").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a Room ID.'
        });

        return;
    }

    Swal.fire({
        title: 'Stop room?',
        text: roomId,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Stop room'
    }).then((result) => {

        if (result.isConfirmed) {

            socket.emit("command", {
                action: "stop_room",
                roomId: roomId
            });

            Swal.fire({
                icon: 'success',
                title: 'Stopped',
                text: `Room stopped: ${roomId}`,
                timer: 1500,
                showConfirmButton: false
            });
        }
    });
}

function testTranscribe() {
    const roomId = document.getElementById("roomId").value.trim();
    const chunkNumber = document.getElementById("extraInput").value.trim();

    if (!roomId) {
        Swal.fire({
            icon: 'error',
            title: 'Missing room',
            text: 'Write a Room ID.'
        });

        return;
    }

    if (!chunkNumber) {
        Swal.fire({
            icon: 'error',
            title: 'Missing chunk',
            text: 'Write a Chunk number.'
        });

        return;
    }

    socket.emit("command", {
        action: "transcribe_test",
        roomId: roomId,
        chunkNumber: chunkNumber
    });

    Swal.fire({
        icon: 'info',
        title: 'Transcribing',
        text: `Chunk ${chunkNumber} sent to worker.`,
        timer: 1800,
        showConfirmButton: false
    });
}

function shutdownWorker(workerSid) {

    Swal.fire({
        title: 'Stop worker?',
        text: "This worker will stop.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes'
    }).then((result) => {

        if (result.isConfirmed) {

            socket.emit("command", {
                action: "shutdown_worker",
                workerSid: workerSid
            });

            Swal.fire(
                'Stopped!',
                'Worker shutdown command sent.',
                'success'
            );
        }
    });
}

function clearLog() {

    Swal.fire({
        title: 'Clear log?',
        text: 'All log messages will be deleted.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes',
        cancelButtonText: 'Cancel'
    }).then((result) => {

        if (result.isConfirmed) {

            document.getElementById("log").innerHTML = "";

            Swal.fire({
                icon: 'success',
                title: 'Cleared',
                text: 'Log cleared.',
                timer: 1200,
                showConfirmButton: false
            });
        }
    });
}

</script>

</body>
</html>
