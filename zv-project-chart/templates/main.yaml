apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-main
  labels:
    app: {{ .Release.Name }}-main
spec:
  replicas: {{ .Values.main.replicaCount }}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-main
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-main
    spec:
      containers:
      - name: main
        image: "{{ .Values.main.image.repository }}:{{ .Values.main.image.tag }}"
        volumeMounts:
        - name: config-volume
          mountPath: /app/.env
          subPath: env-file
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -a
            . /app/.env
            set +a

            sed -i "s|http://localhost:3000|$SERVER_URL|g" /app/main.py

            pip install requests
            python /app/main.py
      volumes:
      - name: config-volume
        configMap:
          name: {{ .Release.Name }}-config